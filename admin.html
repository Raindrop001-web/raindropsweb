<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin | Cloudinary Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (Version 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --bg: #0a0a0a; --sidebar: #121212; --card: #181818; --red: #e63946; --green: #2a9d8f; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--white); overflow-x: hidden; }
        
        /* LOGIN SCREEN */
        #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; }
        .login-card h2 { color: var(--red); margin-bottom: 20px; letter-spacing: 2px; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }

        /* DASHBOARD LAYOUT */
        #admin-panel { display: none; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #222; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar h2 { color: var(--red); padding: 25px; text-align: center; border-bottom: 1px solid #222; font-size: 1.2rem; }
        .menu-item { padding: 15px 25px; color: #aaa; cursor: pointer; border-bottom: 1px solid #222; transition: 0.3s; display: flex; align-items: center; text-decoration: none; }
        .menu-item:hover, .menu-item.active { background: #222; color: var(--red); }
        .menu-item i { margin-right: 12px; width: 20px; }

        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .card h3 { margin-bottom: 15px; color: var(--red); font-size: 1rem; text-transform: uppercase; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        
        .btn { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #ff4d5a; }
        .btn:disabled { background: #444; cursor: wait; }

        .table-container { background: var(--card); border-radius: 10px; border: 1px solid #222; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: var(--red); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.9rem; color: #ccc; }
        
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #333; }
        .delete-btn { background: none; border: none; color: #ff4d5a; cursor: pointer; font-size: 1.1rem; }
        
        .status-msg { margin-top: 10px; font-size: 0.9rem; display: none; text-align: center; }
        .success { color: var(--green); }
        .error { color: var(--red); }

        .field-pill { display: inline-flex; align-items: center; background: #222; padding: 5px 12px; border-radius: 20px; margin: 5px; font-size: 0.8rem; border: 1px solid #333; }
        .field-pill i { margin-left: 8px; color: var(--red); cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <h2>RD ADMIN</h2>
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="sidebar">
            <h2>RAIN DROPS</h2>
            <div class="menu-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-home"></i> <span>Dashboard</span></div>
            <div class="menu-item" onclick="switchTab('enroll-tab', this)"><i class="fas fa-user-graduate"></i> <span>Enrollments</span></div>
            <div class="menu-item" onclick="switchTab('contact-tab', this)"><i class="fas fa-envelope"></i> <span>Messages</span></div>
            <div class="menu-item" onclick="switchTab('form-builder-tab', this)"><i class="fas fa-tools"></i> <span>Form Builder</span></div>
            <div class="menu-item" onclick="switchTab('gallery-tab', this)"><i class="fas fa-images"></i> <span>Gallery</span></div>
            <div class="menu-item" onclick="logout()" style="margin-top: auto; color: var(--red); border-top: 1px solid #222;"><i class="fas fa-power-off"></i> <span>Logout</span></div>
        </div>

        <div class="main-content">
            <div id="dashboard" class="tab-content active">
                <h1>Overview</h1>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top:20px;">
                    <div class="card"><h3 id="count-enroll">0</h3><p>Enrollments</p></div>
                    <div class="card"><h3 id="count-contact">0</h3><p>Messages</p></div>
                    <div class="card"><h3 id="count-gallery">0</h3><p>Gallery Images</p></div>
                </div>
            </div>

            <!-- GALLERY TAB -->
            <div id="gallery-tab" class="tab-content">
                <h1>Gallery Manager (Cloudinary)</h1>
                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-top:20px;">
                    <div class="card">
                        <h3>Upload Image</h3>
                        <input type="file" id="gal-file" accept="image/*">
                        <input type="text" id="gal-title" placeholder="Image Title">
                        <select id="gal-category">
                            <option value="Classroom">Classroom</option>
                            <option value="Events">Events</option>
                            <option value="Students">Students</option>
                        </select>
                        <button class="btn" onclick="uploadToCloudinary()" id="upload-btn">UPLOAD NOW</button>
                        <div id="upload-status" class="status-msg"></div>
                    </div>
                    <div class="card">
                        <h3>Live Gallery</h3>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Image</th><th>Title</th><th>Category</th><th>Action</th></tr></thead>
                                <tbody id="gallery-list"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- OTHER TABS (Same as before but linked to realtime) -->
            <div id="enroll-tab" class="tab-content">
                <h1>Enrollments</h1>
                <div class="table-container"><table><thead id="enroll-head"></thead><tbody id="enroll-list"></tbody></table></div>
            </div>
            <div id="contact-tab" class="tab-content">
                <h1>Messages</h1>
                <div class="table-container"><table><thead id="contact-head"></thead><tbody id="contact-list"></tbody></table></div>
            </div>
            <div id="form-builder-tab" class="tab-content">
                <h1>Form Builder</h1>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="card">
                        <h3>New Field</h3>
                        <select id="fb-target"><option value="enrollment">Enrollment</option><option value="contact">Contact</option></select>
                        <input type="text" id="fb-label" placeholder="Field Name">
                        <select id="fb-type"><option value="text">Text</option><option value="email">Email</option><option value="tel">Phone</option></select>
                        <button class="btn" onclick="saveField()">ADD FIELD</button>
                    </div>
                    <div class="card"><h3>Active Fields</h3><div id="fields-enrollment"></div><div id="fields-contact"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dsd5umdsm/image/upload";
        const CLOUDINARY_PRESET = "upload"; // Replace this

        const firebaseConfig = {
            apiKey: "AIzaSyD1OE_HdA-pjdxA-gaOnR7pUsxsIXuLOMw",
            authDomain: "drop-6067a.firebaseapp.com",
            databaseURL: "https://drop-6067a-default-rtdb.firebaseio.com",
            projectId: "drop-6067a",
            storageBucket: "drop-6067a.firebasestorage.app",
            messagingSenderId: "41944883540",
            appId: "1:41944883540:web:a5a926dd629f129988a8c1"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- AUTH ---
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }
        function logout() { auth.signOut(); }
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
                initListeners();
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // --- CLOUDINARY UPLOAD LOGIC ---
        async function uploadToCloudinary() {
            const file = document.getElementById('gal-file').files[0];
            const title = document.getElementById('gal-title').value;
            const cat = document.getElementById('gal-category').value;
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');

            if(!file || !title) return alert("Select image and title");

            btn.disabled = true;
            btn.innerText = "Uploading to Cloud...";
            status.style.display = "block";
            status.innerHTML = "Sending to Cloudinary...";
            status.className = "status-msg";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_PRESET);

            try {
                // 1. Upload to Cloudinary
                const response = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if(data.secure_url) {
                    // 2. Save Link to Firebase Realtime Database
                    await db.ref('gallery').push({
                        url: data.secure_url,
                        title: title,
                        category: cat,
                        public_id: data.public_id, // stored for future deletion
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });

                    status.innerHTML = "✅ Instant Success! Added to Gallery.";
                    status.classList.add('success');
                    
                    // Reset Form
                    document.getElementById('gal-file').value = "";
                    document.getElementById('gal-title').value = "";
                } else {
                    throw new Error("Cloudinary Upload Failed");
                }
            } catch (error) {
                status.innerHTML = "❌ Error: " + error.message;
                status.classList.add('error');
            } finally {
                btn.disabled = false;
                btn.innerText = "UPLOAD NOW";
                setTimeout(() => { status.style.display = "none"; }, 4000);
            }
        }

        // --- REALTIME DATA ---
        function initListeners() {
            // Stats
            db.ref("enrollments").on('value', s => document.getElementById('count-enroll').innerText = s.numChildren());
            db.ref("contacts").on('value', s => document.getElementById('count-contact').innerText = s.numChildren());
            
            // Gallery Table
            db.ref("gallery").on('value', snap => {
                const list = document.getElementById('gallery-list');
                list.innerHTML = '';
                document.getElementById('count-gallery').innerText = snap.numChildren();
                if(!snap.exists()) return;

                Object.entries(snap.val()).reverse().forEach(([id, val]) => {
                    list.innerHTML += `<tr>
                        <td><img src="${val.url}" class="preview-img"></td>
                        <td>${val.title}</td>
                        <td>${val.category}</td>
                        <td><button onclick="deleteEntry('gallery','${id}')" class="delete-btn"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                });
            });

            // Form Builder Realtime
            ['enrollment', 'contact'].forEach(t => {
                db.ref(`forms/${t}/fields`).on('value', snap => {
                    const container = document.getElementById(`fields-${t}`);
                    container.innerHTML = `<strong>${t.toUpperCase()}</strong><br>`;
                    (snap.val() || []).forEach((f, i) => {
                        container.innerHTML += `<span class="field-pill">${f.label} <i class="fas fa-times" onclick="deleteField('${t}', ${i})"></i></span>`;
                    });
                });
            });

            // Tables for Enroll/Contact
            db.ref("enrollments").on('value', s => renderTable(s.val(), 'enroll-head', 'enroll-list', 'enrollments'));
            db.ref("contacts").on('value', s => renderTable(s.val(), 'contact-head', 'contact-list', 'contacts'));
        }

        function renderTable(data, headId, listId, path) {
            const head = document.getElementById(headId);
            const list = document.getElementById(listId);
            head.innerHTML = ''; list.innerHTML = '';
            if(!data) return;
            const entries = Object.entries(data).reverse();
            const keys = Object.keys(entries[0][1]).filter(k => k !== 'timestamp');
            let hRow = '<tr>';
            keys.forEach(k => hRow += `<th>${k.toUpperCase()}</th>`);
            hRow += '<th>ACTION</th></tr>';
            head.innerHTML = hRow;
            entries.forEach(([id, val]) => {
                let row = '<tr>';
                keys.forEach(k => row += `<td>${val[k] || ''}</td>`);
                row += `<td><button onclick="deleteEntry('${path}','${id}')" class="delete-btn"><i class="fas fa-trash"></i></button></td></tr>`;
                list.innerHTML += row;
            });
        }

        async function saveField() {
            const target = document.getElementById('fb-target').value;
            const label = document.getElementById('fb-label').value;
            if(!label) return;
            const ref = db.ref(`forms/${target}/fields`);
            const snap = await ref.once('value');
            let fields = snap.val() || [];
            fields.push({ label, type: document.getElementById('fb-type').value });
            await ref.set(fields);
            document.getElementById('fb-label').value = '';
        }

        function deleteEntry(path, id) {
            if(confirm("Delete?")) db.ref(path).child(id).remove();
        }

        async function deleteField(target, index) {
            const ref = db.ref(`forms/${target}/fields`);
            const snap = await ref.once('value');
            let fields = snap.val();
            fields.splice(index, 1);
            await ref.set(fields);
        }
    </script>
</body>
</html>
